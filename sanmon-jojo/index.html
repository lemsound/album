<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-color: #8bb4d4;
            --accent-hover: #9cbfe8;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Album Header */
        .album-header {
            display: flex;
            gap: 40px;
            margin-bottom: 50px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .album-art-container {
            flex-shrink: 0;
        }

        .album-art {
            width: 300px;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--bg-secondary);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            display: none;
        }

        .album-art.has-image {
            display: block;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-info {
            flex: 1;
            min-width: 300px;
        }

        .album-metadata {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .album-title {
            font-size: 3.5em;
            font-weight: bold;
            margin-bottom: 15px;
            word-break: break-word;
            line-height: 1.1;
        }

        .album-artist {
            font-size: 1.1em;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .play-button-main {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: var(--accent-color);
            border: none;
            color: var(--bg-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s ease;
            flex-shrink: 0;
            font-weight: bold;
        }

        .play-button-main:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
        }

        .control-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: transparent;
            border: 2px solid var(--text-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .control-button:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .control-button.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background-color: transparent;
        }

        .share-button {
            margin-left: auto;
        }

        /* Progress */
        .progress-container {
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: var(--bg-tertiary);
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: height 0.2s ease;
            position: relative;
        }

        .progress-bar:hover {
            height: 8px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent-color);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        /* Track List */
        .track-list {
            margin-bottom: 40px;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            gap: 16px;
            border-radius: 8px;
            position: relative;
        }

        .track-item:hover {
            background-color: var(--bg-secondary);
        }

        .track-item.playing .track-icon,
        .track-item.playing .track-number {
            position: relative;
        }

        .track-icon {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background-color: var(--bg-secondary);
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        .track-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-icon-number {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: var(--text-secondary);
        }

        .track-play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.2s ease;
            border-radius: 8px;
            font-size: 24px;
            color: var(--accent-color);
        }

        .track-item:hover .track-play-overlay {
            opacity: 1;
        }

        .track-item.playing .track-play-overlay {
            opacity: 1;
            background-color: transparent;
        }

        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 100%;
            width: 100%;
        }

        .waveform-bar {
            width: 2px;
            background-color: var(--accent-color);
            border-radius: 1px;
            animation: wave 0.6s ease-in-out infinite;
        }

        .waveform-bar:nth-child(1) { animation-delay: 0s; height: 20%; }
        .waveform-bar:nth-child(2) { animation-delay: 0.1s; height: 40%; }
        .waveform-bar:nth-child(3) { animation-delay: 0.2s; height: 60%; }
        .waveform-bar:nth-child(4) { animation-delay: 0.1s; height: 40%; }
        .waveform-bar:nth-child(5) { animation-delay: 0s; height: 20%; }

        @keyframes wave {
            0%, 100% { height: 20%; }
            50% { height: 100%; }
        }

        .track-number {
            font-size: 0.95em;
            color: var(--text-secondary);
            min-width: 40px;
            text-align: center;
            flex-shrink: 0;
        }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-name {
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .track-artist {
            font-size: 0.85em;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-item.playing .track-name {
            color: var(--accent-color);
        }

        .track-duration {
            font-size: 0.9em;
            color: var(--text-secondary);
            flex-shrink: 0;
            min-width: 45px;
            text-align: right;
        }

        /* Lyrics */
        .lyrics-container {
            padding: 30px;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            max-height: 60vh;
            overflow-y: auto;
            display: none;
            margin-bottom: 30px;
        }

        .lyrics-container.active {
            display: block;
        }

        .lyrics-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: var(--text-primary);
            font-size: 1em;
            text-align: center;
            word-break: break-word;
        }

        .lyrics-empty {
            text-align: center;
            color: var(--text-secondary);
        }

        .lyrics-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .lyrics-btn {
            background-color: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 24px;
            transition: color 0.2s ease;
            padding: 8px;
        }

        .lyrics-btn:hover {
            color: var(--accent-color);
        }

        .lyrics-btn.active {
            color: var(--accent-color);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .album-header {
                gap: 30px;
            }

            .album-art {
                width: 250px;
            }

            .album-title {
                font-size: 2.5em;
            }

            .controls {
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .album-header {
                gap: 20px;
                align-items: center;
                flex-direction: column;
            }

            .album-art-container {
                width: 100%;
            }

            .album-art {
                width: 100%;
                max-width: 280px;
                margin: 0 auto;
            }

            .album-info {
                text-align: center;
                min-width: auto;
            }

            .album-title {
                font-size: 2em;
            }

            .album-artist {
                font-size: 1em;
            }

            .album-metadata {
                justify-content: center;
            }

            .controls {
                justify-content: center;
                width: 100%;
                gap: 15px;
            }

            .share-button {
                margin-left: 0;
            }

            .track-item {
                padding: 10px 12px;
                gap: 12px;
            }

            .track-icon {
                width: 48px;
                height: 48px;
            }

            .track-number {
                min-width: 35px;
            }

            .track-duration {
                min-width: 40px;
            }

            .lyrics-container {
                padding: 20px;
                max-height: 50vh;
            }

            .lyrics-content {
                font-size: 0.95em;
                line-height: 1.6;
            }
        }

        @media (max-width: 480px) {
            .album-title {
                font-size: 1.5em;
            }

            .album-metadata {
                font-size: 0.85em;
                gap: 10px;
            }

            .track-item {
                padding: 8px 10px;
                gap: 10px;
            }

            .track-icon {
                width: 44px;
                height: 44px;
            }

            .track-number {
                font-size: 0.85em;
                min-width: 30px;
            }

            .track-name {
                font-size: 0.9em;
            }

            .track-artist {
                font-size: 0.8em;
            }

            .track-duration {
                font-size: 0.85em;
                min-width: 35px;
            }

            .play-button-main {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }

            .control-button {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }

            .lyrics-container {
                padding: 15px;
                max-height: 45vh;
            }

            .lyrics-content {
                font-size: 0.9em;
                line-height: 1.5;
            }
        }

        /* Scrollbar */
        .lyrics-container::-webkit-scrollbar {
            width: 8px;
        }

        .lyrics-container::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        .lyrics-container::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }

        .lyrics-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Album Header -->
        <div class="album-header">
            <div class="album-art-container">
                <div class="album-art" id="albumArtContainer">
                    <img id="albumArt" src="" alt="Album Cover">
                </div>
            </div>
            <div class="album-info">
                <div class="album-metadata">
                    <span id="releaseYear"></span>
                    <span id="trackCount"></span>
                    <span id="totalDuration"></span>
                </div>
                <div class="album-title" id="albumTitle">Loading...</div>
                <div class="album-artist" id="albumArtist"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="play-button-main" id="playAllBtn" title="再生">▶</button>
            <button class="control-button" id="shuffleBtn" title="シャッフル">🔀</button>
            <button class="control-button" id="loopBtn" title="ループ">🔁</button>
            <button class="control-button share-button" id="shareBtn" title="共有">🔗</button>
        </div>

        <!-- Progress -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- Lyrics Toggle -->
        <div class="lyrics-toggle">
            <button class="lyrics-btn" id="lyricsToggleBtn" title="歌詞">📄</button>
        </div>

        <!-- Lyrics Container -->
        <div class="lyrics-container" id="lyricsContainer">
            <div class="lyrics-content" id="lyricsContent"></div>
        </div>

        <!-- Track List -->
        <div class="track-list" id="trackList"></div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        class AlbumPlayer {
            constructor() {
                this.tracks = [];
                this.currentTrackIndex = 0;
                this.isPlaying = false;
                this.isShuffle = false;
                this.loopMode = 0;
                this.albumData = {
                    title: '',
                    artist: '',
                    releaseYear: '',
                    duration: 0
                };
                this.timingData = {};
                this.config = {
                    bgPrimary: '#0f0f0f',
                    bgSecondary: '#1a1a1a',
                    bgTertiary: '#282828',
                    accentColor: '#8bb4d4',
                    accentHover: '#9cbfe8',
                    albumTitleFont: 'sans',
                    lyricsFont: 'sans'
                };
                this.shuffleOrder = [];
                this.audioPlayer = document.getElementById('audioPlayer');
                this.init();
            }

            async init() {
                try {
                    await this.loadAlbumMetadata();
                    await this.loadConfig();
                    await this.applyConfig();
                    await this.loadTiming();
                    await this.loadTrackOrder();
                    this.updatePageTitle();
                    this.setupEventListeners();
                    this.setupMediaSession();
                } catch (e) {
                    console.error('Initialization error:', e);
                }
            }

            async loadAlbumMetadata() {
                try {
                    const albumResponse = await fetch('.album');
                    if (albumResponse.ok) {
                        this.albumData.title = (await albumResponse.text()).trim();
                    }

                    const artistResponse = await fetch('.artist');
                    if (artistResponse.ok) {
                        this.albumData.artist = (await artistResponse.text()).trim();
                    }
                } catch (e) {
                    console.log('Error loading album metadata:', e);
                }
            }

            updatePageTitle() {
                let title = this.albumData.title || 'Album';
                if (this.albumData.artist) {
                    title += ` - ${this.albumData.artist}`;
                }
                document.title = title;
            }

            async loadConfig() {
                try {
                    const response = await fetch('config.txt');
                    if (response.ok) {
                        const text = await response.text();
                        this.parseConfig(text);
                    }
                } catch (e) {
                    console.log('Config file not found, using defaults');
                }
            }

            parseConfig(text) {
                const lines = text.split('\n');
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed.startsWith('#')) continue;
                    
                    if (trimmed.includes(':')) {
                        const [key, value] = trimmed.split(':').map(s => s.trim());
                        if (key === 'bgPrimary') this.config.bgPrimary = value;
                        if (key === 'bgSecondary') this.config.bgSecondary = value;
                        if (key === 'bgTertiary') this.config.bgTertiary = value;
                        if (key === 'accentColor') this.config.accentColor = value;
                        if (key === 'accentHover') this.config.accentHover = value;
                        if (key === 'albumTitleFont') this.config.albumTitleFont = value;
                        if (key === 'lyricsFont') this.config.lyricsFont = value;
                    }
                }
            }

            async applyConfig() {
                const root = document.documentElement;
                root.style.setProperty('--bg-primary', this.config.bgPrimary);
                root.style.setProperty('--bg-secondary', this.config.bgSecondary);
                root.style.setProperty('--bg-tertiary', this.config.bgTertiary);
                root.style.setProperty('--accent-color', this.config.accentColor);
                root.style.setProperty('--accent-hover', this.config.accentHover);

                const albumTitleEl = document.querySelector('.album-title');
                const lyricsContentEl = document.querySelector('.lyrics-content');

                if (this.config.albumTitleFont === 'serif') {
                    albumTitleEl.style.fontFamily = "'Noto Serif JP', serif";
                }

                if (this.config.lyricsFont === 'serif') {
                    lyricsContentEl.style.fontFamily = "'Noto Serif JP', serif";
                }
            }

            async loadTiming() {
                try {
                    const response = await fetch('timing.txt');
                    if (response.ok) {
                        const text = await response.text();
                        this.parseTiming(text);
                    }
                } catch (e) {
                    console.log('Timing file not found');
                }
            }

            parseTiming(text) {
                const lines = text.split('\n');
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed.startsWith('#')) continue;

                    const match = trimmed.match(/^(.+?)\s*\(\s*head:([+-]?\d+\.?\d*)\s+end:([+-]?\d+\.?\d*)\s*\)$/);
                    if (match) {
                        const trackName = match[1].trim();
                        this.timingData[trackName] = {
                            headTrim: parseFloat(match[2]),
                            endTrim: parseFloat(match[3])
                        };
                    }
                }
            }

            async loadTrackOrder() {
                try {
                    const response = await fetch('曲順.txt');
                    if (!response.ok) {
                        console.error('Track order file not found');
                        return;
                    }
                    const text = await response.text();
                    const trackNames = text.split('\n').filter(line => line.trim() && !line.trim().startsWith('#'));
                    
                    for (const name of trackNames) {
                        const track = await this.loadTrack(name.trim());
                        if (track) {
                            this.tracks.push(track);
                        }
                    }

                    await this.calculateAlbumDuration();
                    this.renderTrackList();
                    this.updateAlbumDisplay();
                } catch (e) {
                    console.error('Error loading track order:', e);
                }
            }

            async loadTrack(trackName) {
                const audioExtensions = ['.mp3', '.wav'];
                let audioFile = null;

                for (const ext of audioExtensions) {
                    try {
                        const response = await fetch(trackName + ext, { method: 'HEAD' });
                        if (response.ok) {
                            audioFile = trackName + ext;
                            break;
                        }
                    } catch (e) {}
                }

                if (!audioFile) return null;

                let lyrics = '';
                try {
                    const response = await fetch(trackName + '.txt');
                    if (response.ok) {
                        lyrics = await response.text();
                    }
                } catch (e) {}

                let icon = null;
                const imageExtensions = ['.jpg', '.jpeg', '.png'];
                for (const ext of imageExtensions) {
                    try {
                        const response = await fetch(trackName + ext, { method: 'HEAD' });
                        if (response.ok) {
                            icon = trackName + ext;
                            break;
                        }
                    } catch (e) {}
                }

                return {
                    name: trackName,
                    audioFile: audioFile,
                    lyricsFile: lyrics,
                    iconFile: icon,
                    duration: 0
                };
            }

            async calculateAlbumDuration() {
                let totalDuration = 0;
                const promises = [];

                for (const track of this.tracks) {
                    const promise = new Promise((resolve) => {
                        const audio = new Audio();
                        audio.onloadedmetadata = () => {
                            const timing = this.timingData[track.name] || { headTrim: 0, endTrim: 0 };
                            track.duration = Math.max(0, audio.duration + timing.endTrim - timing.headTrim);
                            totalDuration += track.duration;
                            resolve();
                        };
                        audio.onerror = () => resolve();
                        audio.src = track.audioFile;
                    });
                    promises.push(promise);
                }

                await Promise.all(promises);
                this.albumData.duration = totalDuration;
            }

            updateAlbumDisplay() {
                document.getElementById('albumTitle').textContent = this.albumData.title || 'Album';
                
                const artistEl = document.getElementById('albumArtist');
                if (this.albumData.artist) {
                    artistEl.textContent = this.albumData.artist;
                } else {
                    artistEl.style.display = 'none';
                }

                document.getElementById('trackCount').textContent = `${this.tracks.length}曲`;
                document.getElementById('totalDuration').textContent = this.formatTime(this.albumData.duration);

                const img = new Image();
                img.onload = () => {
                    document.getElementById('albumArt').src = img.src;
                    document.getElementById('albumArtContainer').classList.add('has-image');
                };
                img.onerror = () => {
                    document.getElementById('albumArtContainer').classList.remove('has-image');
                };
                img.src = 'jacket.jpeg';
            }

            renderTrackList() {
                const trackList = document.getElementById('trackList');
                trackList.innerHTML = '';

                for (let i = 0; i < this.tracks.length; i++) {
                    const track = this.tracks[i];
                    const trackItem = document.createElement('div');
                    trackItem.className = 'track-item';
                    trackItem.setAttribute('data-index', i);
                    trackItem.onclick = () => this.playTrack(i);

                    let iconHtml = '';
                    if (track.iconFile) {
                        iconHtml = `
                            <div class="track-icon">
                                <img src="${track.iconFile}" alt="">
                                <div class="track-play-overlay">⏸</div>
                            </div>
                        `;
                    } else {
                        iconHtml = `
                            <div class="track-icon">
                                <div class="track-icon-number">${i + 1}</div>
                                <div class="track-play-overlay">▶</div>
                            </div>
                        `;
                    }

                    let html = iconHtml;
                    html += `
                        <div class="track-info">
                            <div class="track-name">${this.escapeHtml(track.name)}</div>
                        </div>
                        <div class="track-duration">${this.formatTime(track.duration)}</div>
                    `;

                    trackItem.innerHTML = html;
                    trackList.appendChild(trackItem);
                }
            }

            setupEventListeners() {
                document.getElementById('playAllBtn').addEventListener('click', () => this.togglePlayAll());
                document.getElementById('shuffleBtn').addEventListener('click', () => this.toggleShuffle());
                document.getElementById('loopBtn').addEventListener('click', () => this.toggleLoop());
                document.getElementById('shareBtn').addEventListener('click', () => this.shareAlbum());
                document.getElementById('lyricsToggleBtn').addEventListener('click', () => this.toggleLyrics());

                this.audioPlayer.addEventListener('timeupdate', () => this.updateProgress());
                this.audioPlayer.addEventListener('ended', () => this.nextTrack());

                const progressBar = document.getElementById('progressBar');
                progressBar.addEventListener('click', (e) => this.seek(e));
            }

            setupMediaSession() {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.setActionHandler('play', () => this.play());
                    navigator.mediaSession.setActionHandler('pause', () => this.pause());
                    navigator.mediaSession.setActionHandler('nexttrack', () => this.nextTrack());
                    navigator.mediaSession.setActionHandler('previoustrack', () => this.previousTrack());
                }
            }

            togglePlayAll() {
                if (this.isPlaying) {
                    this.pause();
                } else {
                    if (this.currentTrackIndex >= this.tracks.length) {
                        this.currentTrackIndex = 0;
                    }
                    this.play();
                }
            }

            play() {
                if (this.tracks.length === 0) return;

                const track = this.tracks[this.currentTrackIndex];
                const timing = this.timingData[track.name] || { headTrim: 0, endTrim: 0 };
                
                if (this.audioPlayer.src !== track.audioFile) {
                    this.audioPlayer.src = track.audioFile;
                    this.audioPlayer.currentTime = Math.max(0, timing.headTrim);
                }

                this.audioPlayer.play();
                this.isPlaying = true;
                this.updateUI();
                this.updateMediaSession();
                this.updateLyricsDisplay();
            }

            pause() {
                this.audioPlayer.pause();
                this.isPlaying = false;
                this.updateUI();
            }

            toggleShuffle() {
                this.isShuffle = !this.isShuffle;
                document.getElementById('shuffleBtn').classList.toggle('active');
                
                if (this.isShuffle) {
                    this.generateShuffleOrder();
                }
            }

            generateShuffleOrder() {
                this.shuffleOrder = Array.from({length: this.tracks.length}, (_, i) => i);
                for (let i = this.shuffleOrder.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.shuffleOrder[i], this.shuffleOrder[j]] = [this.shuffleOrder[j], this.shuffleOrder[i]];
                }
            }

            toggleLoop() {
                this.loopMode = (this.loopMode + 1) % 3;
                const loopBtn = document.getElementById('loopBtn');
                
                if (this.loopMode === 0) {
                    loopBtn.classList.remove('active');
                } else if (this.loopMode === 1) {
                    loopBtn.classList.add('active');
                } else {
                    loopBtn.classList.add('active');
                }
            }

            playTrack(index) {
                this.currentTrackIndex = index;
                this.play();
            }

            nextTrack() {
                if (this.loopMode === 2) {
                    this.play();
                    return;
                }

                if (this.isShuffle) {
                    const currentPos = this.shuffleOrder.indexOf(this.currentTrackIndex);
                    if (currentPos < this.shuffleOrder.length - 1) {
                        this.currentTrackIndex = this.shuffleOrder[currentPos + 1];
                    } else {
                        if (this.loopMode === 1) {
                            this.generateShuffleOrder();
                            this.currentTrackIndex = this.shuffleOrder[0];
                        } else {
                            return;
                        }
                    }
                } else {
                    if (this.currentTrackIndex < this.tracks.length - 1) {
                        this.currentTrackIndex++;
                    } else {
                        if (this.loopMode === 1) {
                            this.currentTrackIndex = 0;
                        } else {
                            return;
                        }
                    }
                }

                this.play();
            }

            previousTrack() {
                if (this.isShuffle) {
                    const currentPos = this.shuffleOrder.indexOf(this.currentTrackIndex);
                    if (currentPos > 0) {
                        this.currentTrackIndex = this.shuffleOrder[currentPos - 1];
                    }
                } else {
                    if (this.currentTrackIndex > 0) {
                        this.currentTrackIndex--;
                    }
                }

                this.play();
            }

            seek(e) {
                const progressBar = document.getElementById('progressBar');
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                
                const track = this.tracks[this.currentTrackIndex];
                const timing = this.timingData[track.name] || { headTrim: 0, endTrim: 0 };
                const duration = this.audioPlayer.duration || track.duration;
                
                this.audioPlayer.currentTime = Math.max(timing.headTrim, timing.headTrim + (percent * track.duration));
            }

            updateProgress() {
                const track = this.tracks[this.currentTrackIndex];
                const timing = this.timingData[track.name] || { headTrim: 0, endTrim: 0 };
                
                const currentTime = Math.max(0, this.audioPlayer.currentTime - timing.headTrim);
                const displayDuration = track.duration;
                
                const percent = (currentTime / displayDuration) * 100;
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('currentTime').textContent = this.formatTime(currentTime);
                document.getElementById('totalTime').textContent = this.formatTime(displayDuration);
            }

            updateUI() {
                const trackItems = document.querySelectorAll('.track-item');
                trackItems.forEach((item, index) => {
                    if (index === this.currentTrackIndex) {
                        item.classList.add('playing');
                        const iconDiv = item.querySelector('.track-icon');
                        if (iconDiv) {
                            iconDiv.innerHTML = `
                                <div class="waveform">
                                    <div class="waveform-bar"></div>
                                    <div class="waveform-bar"></div>
                                    <div class="waveform-bar"></div>
                                    <div class="waveform-bar"></div>
                                    <div class="waveform-bar"></div>
                                </div>
                            `;
                        }
                        const overlay = item.querySelector('.track-play-overlay');
                        if (overlay) {
                            overlay.textContent = '⏸';
                        }
                    } else {
                        item.classList.remove('playing');
                        const iconDiv = item.querySelector('.track-icon');
                        if (iconDiv) {
                            const track = this.tracks[index];
                            if (track.iconFile) {
                                iconDiv.innerHTML = `<img src="${track.iconFile}" alt=""><div class="track-play-overlay">▶</div>`;
                            } else {
                                iconDiv.innerHTML = `<div class="track-icon-number">${index + 1}</div><div class="track-play-overlay">▶</div>`;
                            }
                        }
                    }
                });

                const playBtn = document.getElementById('playAllBtn');
                if (this.isPlaying) {
                    playBtn.textContent = '⏸';
                } else {
                    playBtn.textContent = '▶';
                }
            }

            updateMediaSession() {
                if ('mediaSession' in navigator) {
                    const track = this.tracks[this.currentTrackIndex];
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: track.name,
                        artist: this.albumData.artist,
                        album: this.albumData.title
                    });
                }
            }

            toggleLyrics() {
                const lyricsContainer = document.getElementById('lyricsContainer');
                const isActive = lyricsContainer.classList.toggle('active');
                const btn = document.getElementById('lyricsToggleBtn');
                
                if (isActive) {
                    btn.classList.add('active');
                    this.updateLyricsDisplay();
                } else {
                    btn.classList.remove('active');
                }
            }

            updateLyricsDisplay() {
                const track = this.tracks[this.currentTrackIndex];
                const lyricsContent = document.getElementById('lyricsContent');
                
                if (track.lyricsFile) {
                    lyricsContent.textContent = track.lyricsFile;
                    lyricsContent.classList.remove('lyrics-empty');
                } else {
                    lyricsContent.textContent = '';
                    lyricsContent.classList.add('lyrics-empty');
                }
            }

            shareAlbum() {
                const url = window.location.href;
                if (navigator.share) {
                    navigator.share({
                        title: this.albumData.title,
                        text: `${this.albumData.artist} - ${this.albumData.title}`,
                        url: url
                    }).catch(err => console.log('Share cancelled'));
                } else {
                    navigator.clipboard.writeText(url).then(() => {
                        alert('URLをコピーしました');
                    }).catch(() => {
                        alert(url);
                    });
                }
            }

            formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                new AlbumPlayer();
            });
        } else {
            new AlbumPlayer();
        }
    </script>
</body>
</html>
